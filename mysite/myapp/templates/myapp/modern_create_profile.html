<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Profile — Dribbble Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI,
          Roboto, Helvetica, Arial;
      }
      .spotlight {
        filter: blur(48px);
        opacity: 0.6;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <!-- Decorative gradient -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute left-[-10%] top-[-10%] h-72 w-72 rounded-full bg-indigo-500/20 spotlight"
      ></div>
      <div
        class="absolute right-[-10%] bottom-[-10%] h-96 w-96 rounded-full bg-fuchsia-500/20 spotlight"
      ></div>
    </div>

    <main class="mx-auto max-w-3xl px-4 sm:px-6 py-10">
      <div class="mb-6 flex items-center justify-between">
        <div>
          <h1
            class="text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900"
          >
            Create Profile
          </h1>
          <p class="mt-1 text-sm text-slate-600">
            Tell us a bit about you — this will be used to build your CV.
          </p>
        </div>
        <span
          class="hidden sm:inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold text-slate-600"
          >Autosave ready</span
        >
      </div>

      <section
        class="rounded-3xl border border-slate-200 bg-white p-6 sm:p-8 shadow-sm"
      >
        <form method="POST" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          {% csrf_token %}

          <!-- Name -->
          <div class="sm:col-span-1">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="name"
              >Name</label
            >
            <input
              type="text"
              id="name"
              name="name"
              required
              value="{{user_profile.name}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="Your full name"
            />
          </div>

          <!-- Email -->
          <div class="sm:col-span-1">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="email"
              >Email</label
            >
            <input
              type="email"
              id="email"
              name="email"
              required
              value="{{user_profile.email}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="you@example.com"
            />
          </div>

          <!-- Phone -->
          <div class="sm:col-span-1">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="phone"
              >Phone</label
            >
            <input
              type="text"
              id="phone"
              name="phone"
              required
              value="{{user_profile.phone}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="e.g. +91 98765 43210"
            />
          </div>

          <!-- Degree -->
          <div class="sm:col-span-1">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="degree"
              >Degree</label
            >
            <input
              type="text"
              id="degree"
              name="degree"
              required
              value="{{user_profile.degree}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="e.g. B.Tech in CS"
            />
          </div>

          <!-- School -->
          <div class="sm:col-span-1">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="school"
              >School</label
            >
            <input
              type="text"
              id="school"
              name="school"
              required
              value="{{user_profile.school}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="High school / XII"
            />
          </div>

          <!-- University -->
          <div class="sm:col-span-1">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="university"
              >University</label
            >
            <input
              type="text"
              id="university"
              name="university"
              required
              value="{{user_profile.university}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="College / University"
            />
          </div>

          <!-- Summary -->
          <div class="sm:col-span-2">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="summary"
              >Summary</label
            >
            <textarea
              id="summary"
              name="summary"
              rows="4"
              class="w-full min-h-[120px] rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="Short professional summary"
            >
{{user_profile.summary}}</textarea
            >
            <p class="mt-1 text-xs text-slate-500">
              Tip: 2–4 lines about your experience and goals works best.
            </p>
          </div>

          <!-- Previous Work -->
          <div class="sm:col-span-2">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="previous_work"
              >Previous Work</label
            >
            <textarea
              id="previous_work"
              name="previous_work"
              rows="3"
              class="w-full min-h-[120px] rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="Companies, projects, internships, notable work"
            >
{{user_profile.previous_work}}</textarea
            >
          </div>

          <!-- Skills -->
          <div class="sm:col-span-2">
            <label
              class="mb-1 block text-sm font-semibold text-slate-700"
              for="skills"
              >Skills</label
            >
            <input
              type="text"
              id="skills"
              name="skills"
              required
              value="{{user_profile.skills}}"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-100"
              placeholder="e.g. Python, Django, React, SQL"
            />
            <p class="mt-1 text-xs text-slate-500">
              Comma‑separated skills recommended.
            </p>
          </div>

          <!-- Submit -->
          <div class="sm:col-span-2 mt-2">
            <button
              type="submit"
              class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-extrabold text-white hover:bg-slate-800 active:scale-[.99] transition"
            >
              Submit
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
