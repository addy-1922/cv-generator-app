<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <a href="{% url 'save_profile' %}">Create CV +</a>
    <div class="bg-gray-100">
      {% for resume in resumes %}
      <div class="rounded-lg bg-blue-200 w-1/3">
        <p>{{resume.name}}</p>
        <p>{{resume.email}}</p>
        <div>
          <a href="{% url 'resume' resume.id  %}">Preview</a>
          <a href="">Download</a>
          <a href="">Edit</a>
          <a href="">Delete</a>
        </div>
      </div>

      {% endfor %}
    </div>
  </body>
</html>
