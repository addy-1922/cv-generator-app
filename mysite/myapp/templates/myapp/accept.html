<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-2xl">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Profile</h2>

      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-gray-700 font-medium" for="">Name</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="name"
            id="name"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for="">Email</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="email"
            id="email"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for="">Phone</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="phone"
            id="phone"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for="">Degree</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="degree"
            id="degree"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for="">School</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="school"
            id="school"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for=""
            >University</label
          >
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="university"
            id="university"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for="">Summary</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="summary"
            id="summary"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for=""
            >Previous Work</label
          >
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="previous_work"
            id="previous_work"
          />
        </div>
        <div>
          <label class="block text-gray-700 font-medium" for="">Skills</label>
          <input
            class="w-full p-2 border rounded"
            type="text"
            name="skills"
            id="skills"
          />
        </div>
        <button class="w-full bg-blue-500 text-white rounded hover:bg-blue-600">
          Submit
        </button>
      </form>
    </div>
  </body>
</html>
